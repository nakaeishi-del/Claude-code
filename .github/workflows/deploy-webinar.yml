name: Deploy Webinar App to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'webinar/**'
      - '.github/workflows/deploy-webinar.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webinar/package-lock.json

      - name: Install dependencies
        working-directory: webinar
        run: npm ci

      - name: Build
        working-directory: webinar
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /claude-code

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: webinar/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
